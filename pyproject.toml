[tool.pyright]
include = ["api", "scripts", "*.py"]
exclude = ["**/node_modules", "**/__pycache__", "src", ".next", ".git"]
extraPaths = ["."]
typeCheckingMode = "basic"


[tool.ruff]
line-length = 88
select = ["E", "F", "W", "C90", "I"]

[tool.mypy]
ignore_missing_imports = true
check_untyped_defs = true
