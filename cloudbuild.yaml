steps:
  # 1. Pull imagem anterior para cache
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: ['-c', 'docker pull gcr.io/$PROJECT_ID/xmlrsus2:latest || exit 0']

  # 2. Build da imagem Docker com cache
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '--cache-from', 'gcr.io/$PROJECT_ID/xmlrsus2:latest',
      '-t', 'gcr.io/$PROJECT_ID/xmlrsus2:latest', 
      '.'
    ]

  # 3. Push para Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/xmlrsus2:latest']

  # 4. Deploy para Cloud Run (Exemplo)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'xmlrsus2'
      - '--image'
      - 'gcr.io/$PROJECT_ID/xmlrsus2:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'gcr.io/$PROJECT_ID/xmlrsus2:latest'
